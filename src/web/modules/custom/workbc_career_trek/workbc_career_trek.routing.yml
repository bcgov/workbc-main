workbc_career_trek.settings_form:
  path: '/admin/config/workbc/career-trek'
  defaults:
    _form: '\Drupal\workbc_career_trek\Form\CareerTrekSettingsForm'
    _title: 'Career Trek settings'
  requirements:
    _permission: 'administer site configuration'

workbc_career_trek.content:
  path: '/plan-career/career-trek-videos/{noc}/{episode}'
  defaults:
    _controller: '\Drupal\workbc_career_trek\Controller\CareerTrekVideoController::content'
    _title_callback: '\Drupal\workbc_career_trek\Controller\CareerTrekVideoController::getTitle'
  requirements:
    _permission: 'access content'
